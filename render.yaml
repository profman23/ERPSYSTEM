# Render Blueprint — Infrastructure as Code
# Deploy: https://render.com/docs/blueprint-spec

services:
  # ── Backend API (Staging) ──────────────────────────────────────────────────
  - type: web
    name: erpsystem-api-staging
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: cd server && npm ci && npm run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SERVER_PORT
        value: "5500"
      - key: CLIENT_URL
        sync: false  # e.g., https://erpsystem-app-staging.onrender.com

  # ── Frontend App (Staging) ─────────────────────────────────────────────────
  - type: web
    name: erpsystem-app-staging
    runtime: static
    branch: main
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # e.g., https://erpsystem-api-staging.onrender.com

  # ── Backend API (Production) ───────────────────────────────────────────────
  - type: web
    name: erpsystem-api-production
    runtime: node
    region: frankfurt
    plan: starter
    branch: production
    buildCommand: cd server && npm ci && npm run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SERVER_PORT
        value: "5500"
      - key: CLIENT_URL
        sync: false

  # ── Frontend App (Production) ──────────────────────────────────────────────
  - type: web
    name: erpsystem-app-production
    runtime: static
    branch: production
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
